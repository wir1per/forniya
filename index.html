    <style>

    <script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const FADE_MS = 500;
        const FADE_OUT_LEAD = 0.55;

        function FadingVideo({ src, className = '', style = {}, objectFit = 'cover', objectPosition = 'center',
            widthScale = 1, heightScale = 1 }) {
            const videoRef = useRef(null);
            const animFrameRef = useRef(null);
            const fadingOutRef = useRef(false);
            const currentOpacityRef = useRef(0);
            const isUnmountedRef = useRef(false);

            const fadeTo = useCallback((targetOpacity, duration = FADE_MS) => {
                if (isUnmountedRef.current) return;
                if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
                const video = videoRef.current;
                if (!video) return;
                const startOpacity = parseFloat(video.style.opacity) || currentOpacityRef.current;
                const startTime = performance.now();

                function step(now) {
                    if (isUnmountedRef.current) return;
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const newOpacity = startOpacity + (targetOpacity - startOpacity) * eased;
                    if (videoRef.current) {
                        videoRef.current.style.opacity = newOpacity;
                        currentOpacityRef.current = newOpacity;
                    }
                    if (progress < 1) {
                        animFrameRef.current = requestAnimationFrame(step);
                    } else {
                        if (videoRef.current) {
                            videoRef.current.style.opacity = targetOpacity;
                            currentOpacityRef.current = targetOpacity;
                        }
                        animFrameRef.current = null;
                    }
                }
                animFrameRef.current = requestAnimationFrame(step);
            }, []);

            useEffect(() => {
                isUnmountedRef.current = false;
                const video = videoRef.current;
                if (!video) return;
                video.style.opacity = '0';
                currentOpacityRef.current = 0;
                fadingOutRef.current = false;

                function onLoadedData() {
                    if (isUnmountedRef.current) return;
                    video.style.opacity = '0';
                    currentOpacityRef.current = 0;
                    fadingOutRef.current = false;
                    video.play().catch(() => {});
                    fadeTo(1, FADE_MS);
                }

                function onTimeUpdate() {
                    if (isUnmountedRef.current) return;
                    if (!fadingOutRef.current && video.duration && video.currentTime > 0) {
                        const remaining = video.duration - video.currentTime;
                        if (remaining <= FADE_OUT_LEAD && remaining > 0) {
                            fadingOutRef.current = true;
                            fadeTo(0, FADE_MS);
                        }
                    }
                }

                function onEnded() {
                    if (isUnmountedRef.current) return;
                    video.style.opacity = '0';
                    currentOpacityRef.current = 0;
                    fadingOutRef.current = false;
                    setTimeout(() => {
                        if (isUnmountedRef.current) return;
                        video.currentTime = 0;
                        video.play().catch(() => {});
                        fadingOutRef.current = false;
                        fadeTo(1, FADE_MS);
                    }, 100);
                }

                video.addEventListener('loadeddata', onLoadedData);
                video.addEventListener('timeupdate', onTimeUpdate);
                video.addEventListener('ended', onEnded);

                if (video.readyState >= 2) {
                    onLoadedData();
                }

                return () => {
                    isUnmountedRef.current = true;
                    if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
                    video.removeEventListener('loadeddata', onLoadedData);
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    video.removeEventListener('ended', onEnded);
                };
            }, [src, fadeTo]);

            const baseStyle = {
                opacity: 0,
                ...style,
            };
            const scaleStyle = (widthScale !== 1 || heightScale !== 1) ? {
                width: `${widthScale * 100}%`,
                height: `${heightScale * 100}%`,
            } : {};

            return ( <
                video ref = { videoRef }
                src = { src }
                className = { className }
                style = {
                    { ...baseStyle, ...scaleStyle } }
                autoPlay muted playsInline preload = "auto"
                loop = { false }
                crossOrigin = "anonymous"
                onContextMenu = {
                    (e) => e.preventDefault() }
                />
            );
        }

        function BlurText({ text, className = '', staggerMs = 100, threshold = 0.1 }) {
            const containerRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(el);
                        }
                    });
                }, { threshold });
                observer.observe(el);
                return () => observer.disconnect();
            }, [threshold]);

                const words = useMemo(() => text.split(' '), [text]);

                return ( <
                    p ref = { containerRef }
                    className = { className }
                    style = {
                        { display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' } } > {
                        words.map((word, i) => ( <
                            motion.span key = { i }
                            initial = {
                                { filter: 'blur(10px)', opacity: 0, y: 50 } }
                            animate = {
                                isVisible ? {
                                    filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                                    opacity: [0, 0.5, 1],
                                    y: [50, -5, 0],
                                } : { filter: 'blur(10px)', opacity: 0, y: 50 }
                            }
                            transition = {
                                {
                                    duration: 0.7,
                                    times: [0, 0.5, 1],
                                    ease: 'easeOut',
                                    delay: (i * staggerMs) / 1000,
                                }
                            }
                            style = {
                                { display: 'inline-block', marginRight: '0.28em' } } >
                                { word } <
                                /motion.span>
                            ))
                        } <
                        /p>
                    );
                }

                function AudioPlayer({ src, title, artist, onPlay, onPause }) {
                    const audioRef = useRef(null);
                    const [isPlaying, setIsPlaying] = useState(false);
                    const [currentTime, setCurrentTime] = useState(0);
                    const [duration, setDuration] = useState(0);
                    const [volume, setVolume] = useState(0.7);
                    const [isLiked, setIsLiked] = useState(true);
                    const animRef = useRef(null);

                    useEffect(() => {
                        const audio = audioRef.current;
                        if (!audio) return;

                        function onLoaded() { setDuration(audio.duration || 0); }

                        function onTime() { setCurrentTime(audio.currentTime || 0); }

                        function onEnd() { setIsPlaying(false);
                            setCurrentTime(0);
                            audio.currentTime = 0; if (onPause) onPause(); }
                        audio.addEventListener('loadedmetadata', onLoaded);
                        audio.addEventListener('timeupdate', onTime);
                        audio.addEventListener('ended', onEnd);
                        return () => {
                            audio.removeEventListener('loadedmetadata', onLoaded);
                            audio.removeEventListener('timeupdate', onTime);
                            audio.removeEventListener('ended', onEnd);
                        };
                    }, [src, onPause]);

                    useEffect(() => {
                        if (isPlaying) {
                            function tick() {
                                if (audioRef.current) setCurrentTime(audioRef.current.currentTime);
                                animRef.current = requestAnimationFrame(tick);
                            }
                            animRef.current = requestAnimationFrame(tick);
                        } else {
                            if (animRef.current) cancelAnimationFrame(animRef.current);
                        }
                        return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
                    }, [isPlaying]);

                    const togglePlay = useCallback(() => {
                        const audio = audioRef.current;
                        if (!audio) return;
                        if (isPlaying) {
                            audio.pause();
                            setIsPlaying(false);
                            if (onPause) onPause();
                        } else {
                            audio.play().then(() => {
                                setIsPlaying(true);
                                if (onPlay) onPlay();
                            }).catch(() => {});
                        }
                    }, [isPlaying, onPlay, onPause]);

                    const seek = useCallback((e) => {
                        const rect = e.currentTarget.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const ratio = x / rect.width;
                        if (audioRef.current && duration) {
                            audioRef.current.currentTime = ratio * duration;
                            setCurrentTime(ratio * duration);
                        }
                    }, [duration]);

                    const formatTime = (t) => {
                        if (!t || isNaN(t)) return '0:00';
                        const m = Math.floor(t / 60);
                        const s = Math.floor(t % 60);
                        return `${m}:${s.toString().padStart(2, '0')}`;
                    };

                    const progress = duration > 0 ? (currentTime / duration) * 100 : 0;

                    return ( <
                        div className = "liquid-glass-strong rounded-[1.5rem] p-5 sm:p-6 w-full max-w-[340px] sm:max-w-[380px] shadow-2xl" >
                        <
                        audio ref = { audioRef }
                        src = { src }
                        preload = "auto"
                        crossOrigin = "anonymous" / >
                        <
                        div className = "flex items-center gap-4 mb-4" >
                        <
                        div className = "w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gradient-to-br from-red-900/60 to-rose-700/40 flex items-center justify-center shadow-lg flex-shrink-0" >
                        <
                        svg width = "22"
                        height = "22"
                        viewBox = "0 0 24 24"
                        fill = "white"
                        className = "sm:w-6 sm:h-6" >
                        <
                        path d = "M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" / >
                        <
                        /svg> <
                        /div> <
                        div className = "flex-1 min-w-0" >
                        <
                        p className = "text-white font-body font-medium text-sm sm:text-base truncate" > { title } < /p> <
                        p className = "text-white/60 font-body text-xs sm:text-sm truncate" > { artist } < /p> <
                        /div> <
                        button onClick = {
                            () => setIsLiked(!isLiked) }
                        className = "flex-shrink-0 transition-transform hover:scale-110 active:scale-95" >
                        <
                        svg width = "18"
                        height = "18"
                        viewBox = "0 0 24 24"
                        fill = { isLiked ? '#f87171' : 'none' }
                        stroke = { isLiked ? '#f87171' : 'rgba(255,255,255,0.7)' }
                        strokeWidth = "2"
                        className = "sm:w-5 sm:h-5" >
                        <
                        path d = "M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" /
                        >
                        <
                        /svg> <
                        /button> <
                        /div>

                        <
                        div onClick = { seek }
                        className = "w-full h-2 bg-white/15 rounded-full cursor-pointer mb-3 relative group" >
                        <
                        div className = "h-full rounded-full bg-gradient-to-r from-red-400/80 to-rose-300/60 transition-all duration-100"
                        style = {
                            { width: `${progress}%` } }
                        /> <
                        div className = "absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity"
                        style = {
                            { left: `calc(${progress}% - 8px)` } }
                        /> <
                        /div>

                        <
                        div className = "flex items-center justify-between text-[10px] sm:text-xs text-white/50 font-body" >
                        <
                        span > { formatTime(currentTime) } < /span> <
                        span > -{ formatTime(duration - currentTime) } < /span> <
                        /div>

                        <
                        div className = "flex items-center gap-3 mt-4" >
                        <
                        button className = "flex-1 liquid-glass rounded-full py-2.5 text-sm font-medium text-white hover:scale-[1.03] active:scale-95 transition-transform font-body" >
                        Prev <
                        /button> <
                        button onClick = { togglePlay }

                                fill = "currentColor"
                                className = "sm:w-6 sm:h-6" >
                                <

                                rx = "1" / >
                                <

                                <

                            ) : (

                                viewBox = "0 0 24 24"
                                fill = "currentColor"
                                className = "sm:w-6 sm:h-6 ml-0.5" >
                                <
                                polygon points = "6,4 20,12 6,20" / >
                                <
                                /svg>
                            )
                        } <
                        /button> <

                        Next <
                        /button> <
                        /div> <
                        /div>
                    );
                }

                function AngelPhoto({ src, className = '' }) {
                    return ( <
                        div className = { `relative inline-block ${className}` } >
                        <

                        <

                        onError = {

                }

                function Section({ children, className = '', id = '', style = {} }) {
                    return ( <
                        section id = { id }
                        className = { `relative min-h-screen w-full overflow-hidden ${className}` }
                        style = { style } > { children } <

                    );
                }

                function App() {
                    const [audioPlaying, setAudioPlaying] = useState(false);
                    const [showScrollHint, setShowScrollHint] = useState(true);

                    const heroVideo =
