<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Niyayesh — A Universe by Mobin</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'instrument': ['"Instrument Serif"', 'Georgia', 'serif'],
                        'barlow': ['Barlow', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255,255,255,0.04)',
                        glassBorder: 'rgba(255,255,255,0.10)',
                        glassHover: 'rgba(255,255,255,0.08)',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.025);
            --glass-bg-hover: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --glass-glow: rgba(255, 255, 255, 0.04);
            --text-primary: #f5f5f5;
            --text-secondary: #c5c5c5;
            --text-muted: #999;
            --shadow-glass: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
            --shadow-glass-sm: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            --transition-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #000;
        }

        body {
            background: #000;
            color: var(--text-primary);
            font-family: 'Inter', 'Barlow', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        /* Glass System */
        .glass-base {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            transition: all 0.5s var(--transition-smooth);
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow-glass);
            transition: all 0.6s var(--transition-smooth);
        }
        .glass-card:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08) inset, 0 0 80px rgba(255, 255, 255, 0.02);
            transform: translateY(-4px);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 14px 32px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.5s var(--transition-spring);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            position: relative;
            overflow: hidden;
        }
        .glass-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
        }
        .glass-button:hover::before {
            width: 300px;
            height: 300px;
        }
        .glass-button:hover {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08) inset, 0 0 60px rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
            letter-spacing: 0.04em;
        }
        .glass-button:active {
            transform: scale(0.96);
            transition: transform 0.15s var(--transition-smooth);
        }
        .glass-nav {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s var(--transition-smooth);
        }
        .glass-frame {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-glass);
            padding: 6px;
            transition: all 0.6s var(--transition-smooth);
        }
        .glass-frame:hover {
            border-color: var(--glass-border-hover);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.07) inset, 0 0 100px rgba(255, 255, 255, 0.03);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Word reveal animation */
        .word-reveal {
            display: inline-block;
            opacity: 0;
            filter: blur(12px);
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, filter 0.8s ease-out, transform 0.8s var(--transition-spring);
        }
        .word-reveal.visible {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
        }

        /* Floating animation */
        @keyframes floatGentle {
            0%,
            100% {
                transform: translateY(0);
            }
            25% {
                transform: translateY(-12px);
            }
            50% {
                transform: translateY(-6px);
            }
            75% {
                transform: translateY(-14px);
            }
        }
        .animate-float-gentle {
            animation: floatGentle 7s ease-in-out infinite;
        }

        @keyframes floatSlow {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            33% {
                transform: translateY(-18px) rotate(0.5deg);
            }
            66% {
                transform: translateY(-8px) rotate(-0.5deg);
            }
        }
        .animate-float-slow {
            animation: floatSlow 12s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.03), 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
            }
            50% {
                box-shadow: 0 0 60px rgba(255, 255, 255, 0.07), 0 0 0 1px rgba(255, 255, 255, 0.12) inset;
            }
        }
        .animate-pulse-glow {
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            15% {
                transform: scale(1.15);
                opacity: 1;
            }
            30% {
                transform: scale(1);
                opacity: 0.85;
            }
            45% {
                transform: scale(1.12);
                opacity: 1;
            }
            60% {
                transform: scale(1);
                opacity: 0.8;
            }
        }
        .animate-heart-beat {
            animation: heartBeat 2.5s ease-in-out infinite;
        }

        /* Canvas layers */
        canvas {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Section base */
        .section-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
        }

        @media (max-width: 768px) {
            .section-container {
                padding: 60px 16px;
                min-height: auto;
            }
            .glass-button {
                padding: 12px 24px;
                font-size: 0.85rem;
            }
            .glass-card {
                border-radius: 14px;
            }
        }
        @media (max-width: 480px) {
            .section-container {
                padding: 40px 12px;
            }
            .glass-button {
                padding: 10px 20px;
                font-size: 0.8rem;
                border-radius: 40px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Global Canvas for particle systems -->
    <canvas id="global-canvas"></canvas>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

        // ─────────────────────────────────────
        // ANIMATION SYSTEM (Framer Motion-like)
        // ─────────────────────────────────────
        const MotionContext = createContext({});

        function useAnimationState(initialState) {
            const [state, setState] = useState(initialState);
            const ref = useRef(null);
            const animFrameRef = useRef(null);
            const startTimeRef = useRef(null);
            const fromRef = useRef(null);
            const toRef = useRef(null);
            const durationRef = useRef(500);
            const easingRef = useRef('ease-out');

            const animateTo = useCallback((target, config = {}) => {
                fromRef.current = { ...state };
                toRef.current = target;
                durationRef.current = config.duration || 500;
                easingRef.current = config.easing || 'ease-out';
                startTimeRef.current = null;
                if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);

                function step(timestamp) {
                    if (!startTimeRef.current) startTimeRef.current = timestamp;
                    const elapsed = timestamp - startTimeRef.current;
                    const progress = Math.min(elapsed / durationRef.current, 1);
                    const eased = easingRef.current === 'spring' ?
                        1 - Math.pow(1 - progress, 3) :
                        progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;

                    const newState = {};
                    for (const key in toRef.current) {
                        const from = fromRef.current[key] || 0;
                        const to = toRef.current[key];
                        newState[key] = from + (to - from) * eased;
                    }
                    setState(newState);
                    if (progress < 1) {
                        animFrameRef.current = requestAnimationFrame(step);
                    }
                }
                animFrameRef.current = requestAnimationFrame(step);
            }, [state]);

            useEffect(() => {
                return () => {
                    if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
                };
            }, []);

            return [state, animateTo, ref];
        }

        function useInView(ref, options = {}) {
            const [inView, setInView] = useState(false);
            const [hasAnimated, setHasAnimated] = useState(false);

            useEffect(() => {
                const el = ref?.current;
                if (!el) return;
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setInView(true);
                        if (!hasAnimated) setHasAnimated(true);
                        if (options.once) observer.unobserve(el);
                    } else if (!options.once) {
                        setInView(false);
                    }
                }, { threshold: options.threshold || 0.15, rootMargin: options.rootMargin || '0px' });
                observer.observe(el);
                return () => observer.disconnect();
            }, [ref, options.once, options.threshold, options.rootMargin, hasAnimated]);

            return [inView, hasAnimated];
        }

        // Motion component factory
        function createMotionComponent(tag) {
            return React.forwardRef((props, forwardedRef) => {
                const {
                    initial,
                    animate,
                    transition,
                    whileHover,
                    whileInView,
                    variants,
                    style,
                    className,
                    children,
                    onMouseEnter,
                    onMouseLeave,
                    ...rest
                } = props;

                const innerRef = useRef(null);
                const ref = forwardedRef || innerRef;
                const [animState, animateTo] = useAnimationState(initial || {});
                const [inView] = useInView(ref, { once: true, threshold: 0.1 });
                const [hovered, setHovered] = useState(false);

                useEffect(() => {
                    if (animate && !whileInView) {
                        animateTo(animate, transition || { duration: 600, easing: 'spring' });
                    }
                }, []);

                useEffect(() => {
                    if (whileInView && inView) {
                        const target = typeof whileInView === 'object' ? whileInView : animate || { opacity: 1,
                            y: 0, filter: 'blur(0px)' };
                        animateTo(target, transition || { duration: 700, easing: 'spring' });
                    }
                }, [inView, whileInView]);

                useEffect(() => {
                    if (hovered && whileHover) {
                        const target = typeof whileHover === 'object' ? whileHover : { scale: 1.03 };
                        animateTo(target, { duration: 300, easing: 'spring' });
                    } else if (!hovered && whileHover && animState.scale) {
                        animateTo({ scale: 1 }, { duration: 400, easing: 'spring' });
                    }
                }, [hovered, whileHover]);

                const currentStyle = {
                    ...style,
                    ...animState,
                    transition: transition ? `all ${transition.duration || 0.5}s ${transition.easing || 'ease-out'}` :
                        'all 0.5s ease-out',
                };

                const Tag = tag;
                return (
                    <Tag
                        ref={ref}
                        className={className}
                        style={currentStyle}
                        onMouseEnter={(e) => { setHovered(true); if (onMouseEnter) onMouseEnter(e); }}
                        onMouseLeave={(e) => { setHovered(false); if (onMouseLeave) onMouseLeave(e); }}
                        {...rest}
                    >
                        {children}
                    </Tag>
                );
            });
        }

        const motion = {
            div: createMotionComponent('div'),
            p: createMotionComponent('p'),
            span: createMotionComponent('span'),
            h1: createMotionComponent('h1'),
            h2: createMotionComponent('h2'),
            h3: createMotionComponent('h3'),
            button: createMotionComponent('button'),
            img: createMotionComponent('img'),
            section: createMotionComponent('section'),
            a: createMotionComponent('a'),
        };

        function AnimatePresence({ children, mode = 'wait' }) {
            return React.Children.only(children);
        }

        // ─────────────────────────────────────
        // CANVAS PARTICLE SYSTEM
        // ─────────────────────────────────────
        function useParticleCanvas(config = {}) {
            const canvasRef = useRef(null);
            const particlesRef = useRef([]);
            const animFrameRef = useRef(null);
            const mouseRef = useRef({ x: -1000, y: -1000 });

            const {
                particleCount = 80,
                    particleColor = 'rgba(255,255,255,',
                    maxOpacity = 0.5,
                    minOpacity = 0.05,
                    sizeRange = [0.5, 2.5],
                    speedRange = [0.1, 0.6],
                    connectionDistance = 120,
                    glowSize = 30,
                    driftSpeed = 0.3,
            } = config;

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let w, h;

                function resize() {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                }
                resize();
                window.addEventListener('resize', resize);

                // Initialize particles
                const particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        vx: (Math.random() - 0.5) * speedRange[1] * 2,
                        vy: (Math.random() - 0.5) * speedRange[1] * 2,
                        size: sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]),
                        opacity: minOpacity + Math.random() * (maxOpacity - minOpacity),
                        pulseSpeed: 0.005 + Math.random() * 0.02,
                        pulseOffset: Math.random() * Math.PI * 2,
                        driftX: (Math.random() - 0.5) * driftSpeed,
                        driftY: (Math.random() - 0.5) * driftSpeed,
                    });
                }
                particlesRef.current = particles;

                function animate(timestamp) {
                    ctx.clearRect(0, 0, w, h);

                    for (let i = 0; i < particles.length; i++) {
                        const p = particles[i];
                        p.x += p.vx + p.driftX;
                        p.y += p.vy + p.driftY;

                        // Gentle mouse attraction
                        const dx = mouseRef.current.x - p.x;
                        const dy = mouseRef.current.y - p.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200 && dist > 0) {
                            const force = 0.003;
                            p.vx += (dx / dist) * force;
                            p.vy += (dy / dist) * force;
                        }

                        // Damping
                        p.vx *= 0.999;
                        p.vy *= 0.999;

                        // Wrap around
                        if (p.x < -20) p.x = w + 20;
                        if (p.x > w + 20) p.x = -20;
                        if (p.y < -20) p.y = h + 20;
                        if (p.y > h + 20) p.y = -20;

                        const pulse = Math.sin(timestamp * p.pulseSpeed + p.pulseOffset) * 0.3 + 0.7;
                        const alpha = p.opacity * pulse;

                        // Draw glow
                        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * glowSize);
                        gradient.addColorStop(0, particleColor + (alpha) + ')');
                        gradient.addColorStop(0.3, particleColor + (alpha * 0.6) + ')');
                        gradient.addColorStop(1, particleColor + '0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * glowSize, 0, Math.PI * 2);
                        ctx.fill();

                        // Draw core
                        ctx.fillStyle = particleColor + (alpha * 1.4) + ')';
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Draw connections
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < connectionDistance) {
                                const alpha = (1 - dist / connectionDistance) * 0.12;
                                ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
                                ctx.lineWidth = 0.4;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }

                    animFrameRef.current = requestAnimationFrame(animate);
                }
                animFrameRef.current = requestAnimationFrame(animate);

                const handleMouse = (e) => {
                    mouseRef.current.x = e.clientX;
                    mouseRef.current.y = e.clientY;
                };
                window.addEventListener('mousemove', handleMouse);

                return () => {
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('mousemove', handleMouse);
                    if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
                };
            }, [particleCount, particleColor, maxOpacity, minOpacity, sizeRange[0], sizeRange[1], speedRange[0],
                speedRange[1], connectionDistance, glowSize, driftSpeed
            ]);

            return canvasRef;
        }

        // ─────────────────────────────────────
        // PORTAL CANVAS (3D rotating ring)
        // ─────────────────────────────────────
        function usePortalCanvas(scrollProgress = 0) {
            const canvasRef = useRef(null);
            const particlesRef = useRef([]);
            const animFrameRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let w, h;

                function resize() {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                }
                resize();
                window.addEventListener('resize', resize);

                const ringParticles = [];
                const ringCount = 3;
                const particlesPerRing = 60;
                for (let r = 0; r < ringCount; r++) {
                    const radius = 120 + r * 80;
                    for (let i = 0; i < particlesPerRing; i++) {
                        const angle = (i / particlesPerRing) * Math.PI * 2;
                        ringParticles.push({
                            radius,
                            angle,
                            y: (Math.random() - 0.5) * 60,
                            size: 0.6 + Math.random() * 1.8,
                            opacity: 0.15 + Math.random() * 0.5,
                            speed: 0.0008 + Math.random() * 0.002,
                            ringIndex: r,
                        });
                    }
                }
                particlesRef.current = ringParticles;

                function animate(timestamp) {
                    ctx.clearRect(0, 0, w, h);
                    const cx = w / 2;
                    const cy = h / 2;
                    const rotation = scrollProgress * Math.PI * 2;

                    for (const p of ringParticles) {
                        const currentAngle = p.angle + rotation * (1 + p.ringIndex * 0.5) + timestamp * p.speed;
                        const cosA = Math.cos(currentAngle);
                        const sinA = Math.sin(currentAngle);
                        // Simulate 3D: tilt the ring
                        const tiltX = cosA;
                        const tiltY = sinA * 0.55;
                        const depth = sinA * 0.45;
                        const scale = 1 + depth * 0.4;
                        const px = cx + tiltX * p.radius * scale;
                        const py = cy + tiltY * p.radius * scale + p.y;
                        const alpha = p.opacity * (0.6 + depth * 0.5);
                        const size = p.size * scale;

                        const gradient = ctx.createRadialGradient(px, py, 0, px, py, size * 20);
                        gradient.addColorStop(0, 'rgba(255,255,255,' + alpha + ')');
                        gradient.addColorStop(0.5, 'rgba(255,255,255,' + (alpha * 0.5) + ')');
                        gradient.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(px, py, size * 20, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = 'rgba(255,255,255,' + (alpha * 1.2) + ')';
                        ctx.beginPath();
                        ctx.arc(px, py, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    animFrameRef.current = requestAnimationFrame(animate);
                }
                animFrameRef.current = requestAnimationFrame(animate);

                return () => {
                    window.removeEventListener('resize', resize);
                    if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
                };
            }, [scrollProgress]);

            return canvasRef;
        }

        // ─────────────────────────────────────
        // GLOBAL BACKGROUND CANVAS
        // ─────────────────────────────────────
        function GlobalCanvas() {
            const canvasRef = useParticleCanvas({
                particleCount: 50,
                maxOpacity: 0.3,
                minOpacity: 0.03,
                sizeRange: [0.4, 2],
                speedRange: [0.05, 0.3],
                connectionDistance: 100,
                glowSize: 25,
                driftSpeed: 0.15,
            });

            useEffect(() => {
                const canvas = document.getElementById('global-canvas');
                if (canvas && canvasRef.current) {
                    canvasRef.current = canvas;
                }
            }, []);

            return null;
        }

        // ─────────────────────────────────────
        // WORD REVEAL COMPONENT
        // ─────────────────────────────────────
        function WordReveal({ text, className = '', delay = 0, wordDelay = 0.12 }) {
            const [visibleWords, setVisibleWords] = useState(new Set());
            const words = text.split(' ');

            useEffect(() => {
                const timeouts = [];
                words.forEach((_, i) => {
                    const t = setTimeout(() => {
                        setVisibleWords(prev => new Set([...prev, i]));
                    }, delay + i * wordDelay * 1000);
                    timeouts.push(t);
                });
                return () => timeouts.forEach(clearTimeout);
            }, [text, delay, wordDelay]);

            return (
                <span className={className}>
                    {words.map((word, i) => (
                        <span key={i} className={`word-reveal ${visibleWords.has(i) ? 'visible' : ''}`} style={{ transitionDelay: '0s' }}>
                            {word}{i < words.length - 1 ? ' ' : ''}
                        </span>
                    ))}
                </span>
            );
        }

        // ─────────────────────────────────────
        // AUDIO SHOWCASE
        // ─────────────────────────────────────
        function AudioShowcase() {
            const audioRef = useRef(null);
            const [playing, setPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [progress, setProgress] = useState(0);
            const animFrameRef = useRef(null);
            const waveformRef = useRef(null);

            useEffect(() => {
                const audio = audioRef.current;
                if (!audio) return;

                const handleLoaded = () => setDuration(audio.duration || 0);
                const handleTimeUpdate = () => {
                    setCurrentTime(audio.currentTime);
                    if (audio.duration) setProgress((audio.currentTime / audio.duration) * 100);
                };
                const handleEnded = () => { setPlaying(false);
                    setProgress(0); };

                audio.addEventListener('loadedmetadata', handleLoaded);
                audio.addEventListener('timeupdate', handleTimeUpdate);
                audio.addEventListener('ended', handleEnded);

                return () => {
                    audio.removeEventListener('loadedmetadata', handleLoaded);
                    audio.removeEventListener('timeupdate', handleTimeUpdate);
                    audio.removeEventListener('ended', handleEnded);
                };
            }, []);

            // Waveform animation
            useEffect(() => {
                if (!waveformRef.current) return;
                const bars = waveformRef.current.querySelectorAll('.wave-bar');
                function animateWave() {
                    bars.forEach((bar, i) => {
                        const h = playing ?
                            8 + Math.sin(Date.now() * 0.005 + i * 0.7) * 20 + Math.random() * (playing ? 25 : 6) :
                            4 + Math.sin(Date.now() * 0.002 + i) * 8;
                        bar.style.height = h + 'px';
                    });
                    animFrameRef.current = requestAnimationFrame(animateWave);
                }
                animFrameRef.current = requestAnimationFrame(animateWave);
                return () => { if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current); };
            }, [playing]);

            const togglePlay = () => {
                const audio = audioRef.current;
                if (!audio) return;
                if (playing) {
                    audio.pause();
                } else {
                    audio.play().catch(() => {
                        // If audio file not available, simulate for visual experience
                        setPlaying(true);
                        setTimeout(() => setPlaying(false), 3000);
                    });
                }
                setPlaying(!playing);
            };

            const formatTime = (s) => {
                if (!s || isNaN(s)) return '0:00';
                const m = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return `${m}:${sec.toString().padStart(2, '0')}`;
            };

            const seek = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const pct = x / rect.width;
                const audio = audioRef.current;
                if (audio && audio.duration) {
                    audio.currentTime = pct * audio.duration;
                    setProgress(pct * 100);
                }
            };

            const ref = useRef(null);
            const [inView] = useInView(ref, { once: true, threshold: 0.2 });

            return (
                <section ref={ref} className="section-container" style={{ minHeight: '70vh' }}>
                    <motion.div
                        className="glass-card p-8 md:p-12 max-w-lg mx-auto w-full"
                        initial={{ opacity: 0, y: 50, filter: 'blur(8px)' }}
                        animate={inView ? { opacity: 1, y: 0, filter: 'blur(0px)' } : {}}
                        transition={{ duration: 0.9, easing: 'spring' }}
                    >
                        {/* Album art style area */}
                        <div className="w-full aspect-square max-w-[240px] mx-auto mb-8 glass-base rounded-2xl flex items-center justify-center relative overflow-hidden">
                            <div className="text-center">
                                <div className="text-6xl mb-3 opacity-30">♫</div>
                                <div ref={waveformRef} className="flex items-end justify-center gap-1 h-16">
                                    {Array.from({ length: 24 }).map((_, i) => (
                                        <div key={i} className="wave-bar w-1 bg-white/40 rounded-full transition-all duration-150"
                                            style={{ height: '6px', minHeight: '3px' }}>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="absolute inset-0 rounded-2xl pointer-events-none"
                                style={{ boxShadow: playing ? 'inset 0 0 80px rgba(255,255,255,0.06)' : 'inset 0 0 30px rgba(255,255,255,0.02)' }}>
                            </div>
                        </div>

                        {/* Track info */}
                        <h3 className="font-instrument text-2xl text-center text-white mb-1">Sweater Weather</h3>
                        <p className="font-barlow text-sm text-center text-gray-400 mb-6">The Neighbourhood</p>

                        {/* Progress bar */}
                        <div className="w-full h-1 bg-white/10 rounded-full mb-3 cursor-pointer relative group" onClick={seek}>
                            <div className="h-full bg-white/50 rounded-full transition-all duration-200 relative"
                                style={{ width: `${progress}%` }}>
                                <div className="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg"></div>
                            </div>
                        </div>

                        {/* Time */}
                        <div className="flex justify-between text-xs font-inter text-gray-500 mb-6">
                            <span>{formatTime(currentTime)}</span>
                            <span>{formatTime(duration)}</span>
                        </div>

                        {/* Play button */}
                        <div className="flex justify-center">
                            <button
                                onClick={togglePlay}
                                className="w-16 h-16 rounded-full glass-button !p-0 flex items-center justify-center text-2xl transition-all duration-300"
                                style={{ fontSize: '1.5rem' }}
                            >
                                {playing ? '⏸' : '▶'}
                            </button>
                        </div>
                    </motion.div>

                    {/* Hidden audio element */}
                    <audio ref={audioRef} preload="metadata" style={{ display: 'none' }}>
                        <source src="sweater-weather.mp3" type="audio/mpeg" />
                    </audio>
                </section>
            );
        }

        // ─────────────────────────────────────
        // FOREVER COUNTER
        // ─────────────────────────────────────
        function ForeverCounter() {
            const startDate = useMemo(() => new Date('2024-01-01T00:00:00'), []);
            const [elapsed, setElapsed] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                function update() {
                    const now = new Date();
                    const diff = now - startDate;
                    const totalSeconds = Math.floor(diff / 1000);
                    const days = Math.floor(totalSeconds / 86400);
                    const hours = Math.floor((totalSeconds % 86400) / 3600);
                    const minutes = Math.floor((totalSeconds % 3600) / 60);
                    const seconds = totalSeconds % 60;
                    setElapsed({ days, hours, minutes, seconds });
                }
                update();
                const interval = setInterval(update, 1000);
                return () => clearInterval(interval);
            }, [startDate]);

            const ref = useRef(null);
            const [inView] = useInView(ref, { once: true, threshold: 0.2 });

            const counterData = [
                { label: 'Days', value: elapsed.days },
                { label: 'Hours', value: elapsed.hours },
                { label: 'Minutes', value: elapsed.minutes },
                { label: 'Seconds', value: elapsed.seconds },
            ];

            return (
                <section id="forever" ref={ref} className="section-container" style={{ minHeight: '70vh' }}>
                    <motion.h2
                        className="font-instrument text-3xl sm:text-4xl md:text-5xl text-center mb-12 text-white"
                        initial={{ opacity: 0, y: 30 }}
                        animate={inView ? { opacity: 1, y: 0 } : {}}
                        transition={{ duration: 0.7, easing: 'spring' }}
                    >
                        Together Since
                    </motion.h2>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 max-w-3xl mx-auto w-full">
                        {counterData.map((item, i) => (
                            <motion.div
                                key={item.label}
                                className="glass-card p-6 md:p-8 text-center"
                                initial={{ opacity: 0, scale: 0.8, filter: 'blur(6px)' }}
                                animate={inView ? { opacity: 1, scale: 1, filter: 'blur(0px)' } : {}}
                                transition={{ duration: 0.6, delay: i * 0.12, easing: 'spring' }}
                            >
                                <span className="font-instrument text-4xl sm:text-5xl md:text-6xl text-white block tabular-nums">
                                    {String(item.value).padStart(2, '0')}
                                </span>
                                <span className="font-barlow text-xs md:text-sm text-gray-400 mt-2 block uppercase tracking-widest">
                                    {item.label}
                                </span>
                            </motion.div>
                        ))}
                    </div>

                    <motion.p
                        className="mt-10 font-instrument text-xl text-gray-400 italic text-center"
                        initial={{ opacity: 0 }}
                        animate={inView ? { opacity: 1 } : {}}
                        transition={{ duration: 0.8, delay: 0.8 }}
                    >
                        And counting, endlessly...
                    </motion.p>
                </section>
            );
        }

        // ─────────────────────────────────────
        // FINAL SECTION
        // ─────────────────────────────────────

            const canvasRef = useParticleCanvas({
                particleCount: 60,
                maxOpacity: 0.35,

                            className="font-instrument text-3xl sm:text-4xl md:text-5xl lg:text-6xl text-white leading-relaxed"

                            A universe crafted with love • For Niyayesh • Forever
                        </motion.p>
                    </div>
                </section>
            );
        }

        // ─────────────────────────────────────
        // MAIN APP
        // ─────────────────────────────────────
        function App() {
            return (
                <div className="relative bg-black text-white min-h-screen">
                    <GlobalCanvas />
                    <Navigation />
                    <HeroSection />
                    <AngelSection />
                    <TimelineSection />
                    <VampireDiariesSection />
                    <AudioShowcase />
                    <PortalSection />
                    <MemoryGallery />
                    <LetterSection />
                    <ForeverCounter />
                    <HeavenSection />
                    <FinalSection />

                    {/* Footer */}
                    <footer className="py-12 text-center relative z-10">
                        <div className="max-w-4xl mx-auto px-6">
                            <div className="w-full h-px bg-white/5 mb-8"></div>
                            <p className="font-instrument text-lg text-white/40 italic">Mobin & Niyayesh</p>

                        </div>
                    </footer>
                </div>
            );
        }

        // ─────────────────────────────────────
        // RENDER
        // ─────────────────────────────────────
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);

        console.log('%c✨ A Universe for Niyayesh %c— Crafted with infinite love by Mobin %c✨',
            'font-size:18px;color:#fff;', 'font-size:14px;color:#ccc;', 'font-size:18px;color:#fff;');
        console.log('%cEvery line of code written with you in mind. Forever. ♥', 'font-size:12px;color:#999;');
